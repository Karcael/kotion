services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: kotion
      POSTGRES_PASSWORD: kotion
      POSTGRES_DB: kotion
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kotion"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      DATABASE_URL: "postgresql://kotion:kotion@postgres:5432/kotion"
      JWT_SECRET: "${JWT_SECRET:-kotion-super-secret-jwt-key-change-in-production}"
      NEXT_PUBLIC_APP_URL: "${NEXT_PUBLIC_APP_URL:-http://localhost:3000}"
      UPLOAD_DIR: "/app/data/uploads"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads:/app/data/uploads

volumes:
  postgres-data:
  uploads:
